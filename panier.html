<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .cart-item{
            background:#fff;
            border-radius:12px;
            padding:20px;
            margin-bottom:20px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
        }

        .cart-item img{
            width:120px;
            border-radius:10px;
        }

        .quantity{
            width:70px;
        }

        .summary{
            background:#fff;
            border-radius:12px;
            padding:25px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
        }

        .price{
            font-weight:bold;
            color:#198754;
            font-size:20px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="mb-4 text-center">🛒 Mon Panier</h2>

    <div class="row">

        <!-- Produits -->
        <div class="col-lg-8">

            <div class="cart-item d-flex align-items-center">

                <img src="https://via.placeholder.com/120" alt="">

                <div class="ms-4 flex-grow-1">

                    <h5>Nom du Produit</h5>

                    <p class="text-muted">
                        Description courte du produit.
                    </p>

                    <div class="d-flex align-items-center">

                        <input
                        type="number"
                        class="form-control quantity"
                        value="1"
                        min="1">

                        <button class="btn btn-danger ms-3">
                            Supprimer
                        </button>

                    </div>

                </div>

                <div class="price">
                    299 DH
                </div>

            </div>

            <div class="cart-item d-flex align-items-center">

                <img src="https://via.placeholder.com/120" alt="">

                <div class="ms-4 flex-grow-1">

                    <h5>Nom du Produit</h5>

                    <p class="text-muted">
                        Description courte du produit.
                    </p>

                    <div class="d-flex align-items-center">

                        <input
                        type="number"
                        class="form-control quantity"
                        value="2"
                        min="1">

                        <button class="btn btn-danger ms-3">
                            Supprimer
                        </button>

                    </div>

                </div>

                <div class="price">
                    499 DH
                </div>

            </div>

        </div>

        <!-- Résumé -->
        <div class="col-lg-4">

            <div class="summary">

                <h4>Résumé</h4>

                <hr>

                <div class="d-flex justify-content-between">
                    <span>Sous-total</span>
                    <strong>798 DH</strong>
                </div>

                <div class="d-flex justify-content-between mt-2">
                    <span>Livraison</span>
                    <strong>40 DH</strong>
                </div>

                <hr>

                <div class="d-flex justify-content-between">

                    <h5>Total</h5>

                    <h4 class="text-success">
                        838 DH
                    </h4>

                </div>

                <button class="btn btn-success w-100 mt-4">
                    Passer la commande
                </button>

                <button class="btn btn-outline-secondary w-100 mt-2">
                    Continuer les achats
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
