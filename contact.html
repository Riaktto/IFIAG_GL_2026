<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - IFIAG</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .container{
            width:90%;
            max-width:700px;
            margin:50px auto;
            background:white;
            padding:35px;
            border-radius:10px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            color:#2c3e50;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        textarea{
            resize:vertical;
        }

        button{
            width:100%;
            padding:14px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0056b3;
        }

        .infos{
            margin-top:35px;
            text-align:center;
            color:#555;
            line-height:1.8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Contactez-nous</h1>

    <p>
        Une question, une suggestion ou un problème ?
        Remplissez le formulaire ci-dessous.
    </p>

    <form id="contactForm">

        <label>Nom complet</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Sujet</label>
        <input type="text" required>

        <label>Message</label>
        <textarea rows="6" required></textarea>

        <button type="submit">
            Envoyer
        </button>

    </form>

    <div class="infos">
        <h3>Nos coordonnées</h3>

        <p>
            📍 IFIAG - Université<br>
            📧 contact@ifiag.com<br>
            📞 +221 77 000 00 00
        </p>
    </div>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit",function(e){

    e.preventDefault();

    alert("Votre message a été envoyé avec succès !");

    this.reset();

});
</script>

</body>
</html>
